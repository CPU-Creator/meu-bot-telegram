services:
  promoradar:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./promocoes.db:/app/promocoes.db
    ports:
      - "${WEB_SERVER_PORT:-8080}:${WEB_SERVER_PORT:-8080}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
